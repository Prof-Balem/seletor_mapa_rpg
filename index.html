<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>🎲 RPG Map Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🎲 RPG Map Viewer</h1>
    <input type="text" id="search" placeholder="Buscar mapas...">
  </header>

  <div id="container">
    <aside id="sidebar"></aside>
    <main id="gallery"></main>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden">
    <span id="close">&times;</span>
    <img id="modal-img">
  </div>

  <script src="script.js"></script>
</body>
</html>
